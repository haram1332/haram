<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 조립형 연습 웹앱</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --accent-color: #ff6b6b;
            --success-color: #2ecc71;
            --text-color: #333;
            --card-bg: #fff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #eef2f7;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--secondary-color);
            padding: 10px;
            border-radius: 10px;
        }

        .question-area {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border: 3px dashed var(--primary-color);
            border-radius: 15px;
        }

        .question-text {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
        }

        .label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #666;
            display: block;
        }

        /* 답안 조립 영역 */
        .assembly-zone {
            min-height: 100px;
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .assembly-zone.drag-over {
            background: #e1f5fe;
            border-color: var(--primary-color);
        }

        /* 선택지 카드 영역 */
        .choices-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: var(--secondary-color);
            border-radius: 15px;
            margin-bottom: 30px;
        }

        /* 카드 스타일 */
        .card {
            background: var(--card-bg);
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px 25px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card:active {
            transform: translateY(0);
        }

        .card.dragging {
            opacity: 0.5;
        }

        /* 컨트롤 버튼 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-submit:hover {
            background-color: #357abd;
        }

        .btn-next {
            background-color: var(--success-color);
            color: white;
            display: none;
        }

        .btn-next:hover {
            background-color: #27ae60;
        }

        /* 피드백 영역 */
        #feedback {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }

        .feedback-correct { color: var(--success-color); }
        .feedback-wrong { color: var(--accent-color); }

        /* 결과 화면 */
        #result-screen {
            display: none;
            text-align: center;
        }

        #result-screen h2 {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .score-big {
            font-size: 5rem;
            font-weight: 900;
            color: var(--accent-color);
            margin: 20px 0;
        }

        /* 반응형 */
        @media (max-width: 600px) {
            .question-text { font-size: 2rem; }
            .card { font-size: 1.2rem; padding: 10px 15px; }
            button { width: 100%; }
        }

        /* 첨자 스타일 */
        sup {
            font-size: 0.6em;
        }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <header>
        <h1>곱셈공식 조립하기 🧩</h1>
        <div class="stats">
            <span>문제: <span id="current-num">1</span> / <span id="total-num">10</span></span>
            <span>맞힌 개수: <span id="score">0</span></span>
        </div>
    </header>

    <div id="quiz-screen">
        <div class="question-area">
            <span class="label">다음 식을 전개하면?</span>
            <p class="question-text" id="question-display">(a + b)²</p>
        </div>

        <span class="label">답안 조립 영역 (카드를 클릭하거나 드래그하여 완성하세요)</span>
        <div class="assembly-zone" id="assembly-zone">
            <!-- 조립된 카드가 여기에 들어감 -->
        </div>

        <span class="label">선택지 카드</span>
        <div class="choices-zone" id="choices-zone">
            <!-- 선택지 카드가 여기에 생성됨 -->
        </div>

        <div class="controls">
            <button class="btn-submit" onclick="checkAnswer()">답 제출하기</button>
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">다음 문제</button>
        </div>

        <div id="feedback"></div>
    </div>

    <div id="result-screen">
        <h2>학습 완료!</h2>
        <p>당신의 최종 점수는:</p>
        <div class="score-big"><span id="final-score">0</span>점</div>
        <p id="result-comment"></p>
        <button class="btn-submit" onclick="location.reload()">다시 도전하기</button>
    </div>
</div>

<script>
    /**
     * 문제 은행 (Question Bank)
     * q: 문제식
     * correct: 정답 카드들의 정확한 순서 배열
     * choices: 선택지에 표시될 카드들 (정답 + 오답 포함)
     * hint: 오답 시 보여줄 힌트
     */
    const questionBank = [
        {
            q: "(a + b)²",
            correct: ["a²", "+", "2ab", "+", "b²"],
            choices: ["a²", "2ab", "b²", "+", "+", "-", "2a", "2b", "ab", "a", "b", "a²b²"],
            hint: "(a + b)² = a² + 2ab + b² 입니다. 가운데 항인 2ab를 잊지 마세요!"
        },
        {
            q: "(a - b)²",
            correct: ["a²", "-", "2ab", "+", "b²"],
            choices: ["a²", "2ab", "b²", "-", "+", "-", "ab", "2a", "2b", "a²-b²"],
            hint: "(a - b)² = a² - 2ab + b² 입니다. 부호 순서(-, +)에 주의하세요."
        },
        {
            q: "(a + b)(a - b)",
            correct: ["a²", "-", "b²"],
            choices: ["a²", "-", "b²", "+", "2ab", "ab", "a", "b", "a²-2ab+b²"],
            hint: "합차 공식입니다. (a + b)(a - b) = a² - b² 이 됩니다."
        },
        {
            q: "(x + 3)(x + 5)",
            correct: ["x²", "+", "8x", "+", "15"],
            choices: ["x²", "+", "8x", "+", "15", "x", "2x", "15x", "8", "3x", "5x"],
            hint: "(x + a)(x + b) = x² + (a+b)x + ab 공식을 생각해보세요. 3+5=8, 3×5=15 입니다."
        },
        {
            q: "(2x + 3)²",
            correct: ["4x²", "+", "12x", "+", "9"],
            choices: ["4x²", "+", "12x", "+", "9", "2x²", "6x", "3x", "4x", "12"],
            hint: "(2x)² = 4x², 2 × (2x) × 3 = 12x, 3² = 9 입니다."
        },
        {
            q: "(x - 4)(x + 5)",
            correct: ["x²", "+", "x", "-", "20"],
            choices: ["x²", "+", "x", "-", "20", "-", "x", "9x", "-9x", "20", "+20", "-1"],
            hint: "상수항의 합은 -4 + 5 = 1, 곱은 -4 × 5 = -20 입니다."
        },
        {
            q: "(3a - b)²",
            correct: ["9a²", "-", "6ab", "+", "b²"],
            choices: ["9a²", "-", "6ab", "+", "b²", "3a²", "6a", "3ab", "-3ab", "2b", "6ab"],
            hint: "(3a)² = 9a², 2 × (3a) × (-b) = -6ab, (-b)² = b² 입니다."
        },
        {
            q: "(2x + 1)(2x - 1)",
            correct: ["4x²", "-", "1"],
            choices: ["4x²", "-", "1", "+", "4x", "2x", "2x²", "1", "0"],
            hint: "합차 공식을 적용해보세요. (2x)² - 1² 입니다."
        },
        {
            q: "(x - 7)(x + 3)",
            correct: ["x²", "-", "4x", "-", "21"],
            choices: ["x²", "-", "4x", "-", "21", "+", "4x", "10x", "-10x", "21", "+21"],
            hint: "합은 -7 + 3 = -4, 곱은 -7 × 3 = -21 입니다."
        },
        {
            q: "(5x + 2)²",
            correct: ["25x²", "+", "20x", "+", "4"],
            choices: ["25x²", "+", "20x", "+", "4", "10x²", "10x", "20", "25x", "4x"],
            hint: "(5x)² = 25x², 2 × (5x) × 2 = 20x, 2² = 4 입니다."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let assembledCards = [];

    // DOM 요소
    const questionDisplay = document.getElementById('question-display');
    const assemblyZone = document.getElementById('assembly-zone');
    const choicesZone = document.getElementById('choices-zone');
    const currentNumDisplay = document.getElementById('current-num');
    const totalNumDisplay = document.getElementById('total-num');
    const scoreDisplay = document.getElementById('score');
    const feedbackDisplay = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalScoreDisplay = document.getElementById('final-score');
    const resultComment = document.getElementById('result-comment');

    // 초기화
    function initGame() {
        totalNumDisplay.textContent = questionBank.length;
        loadQuestion();
    }

    // 문제 로드
    function loadQuestion() {
        const currentQuestion = questionBank[currentQuestionIndex];
        questionDisplay.textContent = currentQuestion.q;
        currentNumDisplay.textContent = currentQuestionIndex + 1;
        assembledCards = [];
        renderAssembledCards();
        renderChoices();
        feedbackDisplay.textContent = "";
        nextBtn.style.display = "none";
        
        // 답안 영역 드래그 앤 드롭 이벤트 설정
        setupDragAndDrop();
    }

    // 선택지 셔플 및 렌더링
    function renderChoices() {
        choicesZone.innerHTML = "";
        const currentQuestion = questionBank[currentQuestionIndex];
        
        // 선택지 셔플 (중복 제거하지 않고 문제에서 정의한 대로 사용)
        const shuffledChoices = [...currentQuestion.choices].sort(() => Math.random() - 0.5);
        
        shuffledChoices.forEach((text, index) => {
            const card = createCard(text, index);
            choicesZone.appendChild(card);
        });
    }

    // 카드 생성 (공통 함수)
    function createCard(text, index) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = text.replace(/²/g, '<sup>2</sup>'); // 제곱 표시 처리
        card.draggable = true;
        card.dataset.value = text;
        
        // 클릭 이벤트: 클릭 시 답안 영역에 추가
        card.onclick = () => {
            if (nextBtn.style.display === "block") return; // 정답 맞힌 후엔 클릭 방지
            addCardToAssembly(text);
        };

        // 드래그 시작 이벤트
        card.ondragstart = (e) => {
            if (nextBtn.style.display === "block") return false;
            e.dataTransfer.setData('text/plain', text);
            card.classList.add('dragging');
        };

        card.ondragend = () => {
            card.classList.remove('dragging');
        };

        return card;
    }

    // 조립 영역 카드 추가
    function addCardToAssembly(text) {
        assembledCards.push(text);
        renderAssembledCards();
    }

    // 조립 영역 카드 제거
    function removeCardFromAssembly(index) {
        if (nextBtn.style.display === "block") return; // 정답 맞힌 후엔 제거 방지
        assembledCards.splice(index, 1);
        renderAssembledCards();
    }

    // 조립된 카드 렌더링
    function renderAssembledCards() {
        assemblyZone.innerHTML = "";
        assembledCards.forEach((text, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = text.replace(/²/g, '<sup>2</sup>');
            card.onclick = () => removeCardFromAssembly(index);
            assemblyZone.appendChild(card);
        });
        
        // 카드가 없으면 안내 텍스트나 placeholder 유지 가능 (현재는 비어둠)
    }

    // 드래그 앤 드롭 설정
    function setupDragAndDrop() {
        assemblyZone.ondragover = (e) => {
            e.preventDefault();
            assemblyZone.classList.add('drag-over');
        };

        assemblyZone.ondragleave = () => {
            assemblyZone.classList.remove('drag-over');
        };

        assemblyZone.ondrop = (e) => {
            e.preventDefault();
            assemblyZone.classList.remove('drag-over');
            const text = e.dataTransfer.getData('text/plain');
            if (text) {
                addCardToAssembly(text);
            }
        };
    }

    // 답안 확인
    function checkAnswer() {
        if (nextBtn.style.display === "block") return;

        const currentQuestion = questionBank[currentQuestionIndex];
        const correctAnswer = currentQuestion.correct;
        
        // 순서와 내용 비교
        const isCorrect = JSON.stringify(assembledCards) === JSON.stringify(correctAnswer);
        
        if (isCorrect) {
            score++;
            scoreDisplay.textContent = score;
            feedbackDisplay.textContent = "정답입니다! 참 잘했어요! 🎉";
            feedbackDisplay.className = "feedback-correct";
            nextBtn.style.display = "block";
            
            // 시각적 피드백
            assemblyZone.style.borderColor = "#2ecc71";
            assemblyZone.style.backgroundColor = "#e8f8f0";
        } else {
            feedbackDisplay.textContent = "틀렸어요! 힌트: " + currentQuestion.hint;
            feedbackDisplay.className = "feedback-wrong";
            
            // 틀렸을 때 흔들리는 효과 등 추가 가능
            assemblyZone.classList.add('shake');
            setTimeout(() => assemblyZone.classList.remove('shake'), 500);
        }
    }

    // 다음 문제로 이동
    function nextQuestion() {
        currentQuestionIndex++;
        assemblyZone.style.borderColor = "#ddd";
        assemblyZone.style.backgroundColor = "#f9f9f9";
        
        if (currentQuestionIndex < questionBank.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    // 결과 화면 표시
    function showResult() {
        quizScreen.style.display = "none";
        resultScreen.style.display = "block";
        finalScoreDisplay.textContent = score * 10; // 10점 만점 기준 환산 등 자유롭게
        
        if (score === questionBank.length) {
            resultComment.textContent = "완벽해요! 곱셈공식 마스터이시군요!";
        } else if (score >= questionBank.length * 0.7) {
            resultComment.textContent = "훌륭합니다! 조금만 더 연습하면 완벽해질 거예요.";
        } else {
            resultComment.textContent = "조금 더 연습이 필요해요. 다시 한번 도전해볼까요?";
        }
    }

    // 게임 시작
    initGame();
</script>

<!-- 간단한 애니메이션 효과를 위한 스타일 추가 -->
<style>
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }
    .shake {
        animation: shake 0.3s ease-in-out;
        border-color: var(--accent-color) !important;
    }
</style>

</body>
</html>
